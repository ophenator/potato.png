<!DOCTYPE html>
<html>
<head>
    <title>Potato Stock Simulator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f1e6;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
            background: #8b5a2b;
            color: white;
            border: none;
        }

        button:hover {
            background: #a06a35;
        }

        #price {
            font-size: 24px;
        }

        #news {
            color: darkred;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Potato Stock Sim</h1>

<p id="price">Price: $10</p>
<p id="news">Market is stable...</p>

<h2>Your Stats</h2>
<p>Money: $<span id="money">100</span></p>
<p>Potatoes Owned: <span id="owned">0</span></p>

<button onclick="buy()">Buy Potato</button>
<button onclick="sell()">Sell Potato</button>
<button onclick="buy10()">Buy 10 Potatoes</button>
<button onclick="sell10()">Sell 10 Potatoes</button>

<script>
let price = 10;
let money = 100;
let owned = 0;

function updateDisplay() {
    document.getElementById("price").innerText = "Price: $" + price.toFixed(2);
    document.getElementById("money").innerText = money.toFixed(2);
    document.getElementById("owned").innerText = owned;
}

// Buy
function buy() {
    if (money >= price) {
        money -= price;
        owned++;
        updateDisplay();
    }
}

// Sell
function sell() {
    if (owned > 0) {
        money += price;
        owned--;
        updateDisplay();
    }
}

function buy10() {
    if (money >= price * 10) {
        money -= price * 10;
        owned += 10;
        updateDisplay();
    }
}

function sell10() {
    if (owned >= 10) {
        money += price * 10;
        owned -= 10;
        updateDisplay();
    }
}

// Market simulation
function updateMarket() {
    let change = (Math.random() - 0.5) * 2;

    // Random events
    let eventRoll = Math.random();

    if (eventRoll < 0.05) {
        change += 5;
        setNews("Potato shortage! Prices skyrocketing!");
    } 
    else if (eventRoll < 0.1) {
        change -= 5;
        setNews("Potato oversupply! Prices crashing!");
    } 
    else if (eventRoll < 0.15) {
        change += 3;
        setNews("New potato recipe goes viral! Demand surges!");
    }
    else if (eventRoll < 0.2) {
        change -= 3;
        setNews("Health scare about potatoes! Demand plummets!");
    } else if (eventRoll < 0.25) {
        setNews("Celebrity endorses potatoes!");
    } else if (eventRoll < 0.3) {
        setNews("Fun potato website somewhere...");
    } else if (eventRoll < 0.35) {
        setNews("My cat hates potatoes... fsr");
    } else if (eventRoll < 0.4) {
        setNews("My word quota is too high rn");
    } else if (eventRoll < 0.45) {
        setNews("POTATOES ARE THE WORLD ECONOMY");
    } else if (eventRoll < 0.5) {
        setNews("√ˆ¥≈˚©∆ç¬¨®¨˚ç¬¨†≈∑œ¨");
    } else if (eventRoll < 0.55) {
        setNews("Ma ma ma MA. Cant read my, cant read my, no you cant read-a my po-ta-to!");
    } else if (eventRoll < 0.6) {
        setNews("I have no more news ideas...");
    } else if (eventRoll < 0.65) {
        setNews("I should probably stop writing news events now...");
    } else if (eventRoll < 0.7) {
        setNews("FuN fUn FuN FuN fUn FuN fUN fUN fUN fUN fUN fUN fUN fUN fUN fUN fUN fUN fUN");
    } else if (eventRoll < 0.75) {
        setNews("Don'T sTOp. BeleAviNg. hoLD oN To thAT feELiNg.");
    } else if (eventRoll < 0.8) {
        setNews("\"woah-OH LIVING ON A PRAYER TAKE MY HAND AND WE'LL MAKE IT I SWEAR\" - Bon Jovi");
    } else if (eventRoll < 0.85) {
        setNews("INSERT NEWS HERE");
    } else if (eventRoll < 0.9) {
        setNews("BREAKING NEWS: Potato simulator is doing well! (jk)");
    } else if (eventRoll < 0.95) {
        setNews("BREAKING NEWS: Potato simulator is doing terribly! (jk)");
    } else {
        setNews("Market fluctuating...");
    }

    price += change;

    if (price < 1) price = 1;

    updateDisplay();
}

function setNews(text) {
    document.getElementById("news").innerText = text;
}

setInterval(updateMarket, 2000);

updateDisplay();
</script>

</body>
</html>
