<!DOCTYPE html>
<html>
<head>
    <title>Potato Clicker</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #ffffff;
        }

        #potato {
            width: 200px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #potato:active {
            transform: scale(0.9);
        }

        .button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
            background: #8b5a2b;
            color: white;
            border: none;
        }

        .button:hover {
            background: #a06a35;
        }
    </style>
</head>
<body>

    <h1>Potato Clicker</h1>

    <h2 id="count">Potatoes: 0</h2>

    <img id="potato" src="PagePhotos/potatoclick.jpg" onclick="clickPotato()">

    <h3>Upgrades</h3>
    <button class="button" onclick="resetGame()">Reset Game</button>
    <button class="button" onclick="saveGame()">Save Game</button>
    <button class="button" onclick="loadGame()">Load Game</button>
    <br>
    <button class="button" onclick="buyFarmer()">Buy Farmer (Cost: <span id="farmerCost">10</span>)</button><br>
    <button class="button" onclick="buyTractor()">Buy Tractor (Cost: <span id="tractorCost">100</span>)</button><br>
    <button class="button" onclick="buyLand()">Buy More Land (Cost: <span id="landCost">500</span>)</button><br>
    <button class="button" onclick="autoFarm()">Auto-Farm (1 Potato/Sec per Farmer, 4 Potatoes/Sec per Tractor, 10 Potatoes/Sec per Land)</button>

    <p>Farmers: <span id="farmers">0</span></p>
    <p>Tractors: <span id="tractors">0</span></p>
    <p>Land: <span id="land">0</span></p>

<script>
    let potatoes = 0;
    let farmers = 0;
    let tractors = 0;
    let land = 0;
    let farmerCost = 10;
    let tractorCost = 100;
    let landCost = 500;

   function updateDisplay() {
       document.getElementById("count").innerText = "Potatoes: " + Math.floor(potatoes);
       document.getElementById("farmers").innerText = farmers;
       document.getElementById("farmerCost").innerText = farmerCost;
       document.getElementById("tractors").innerText = tractors;
       document.getElementById("tractorCost").innerText = tractorCost;
       document.getElementById("land").innerText = land;
       document.getElementById("landCost").innerText = landCost;
       // Ensure numeric values for display
       const displayPotatoes = Number.isFinite(Number(potatoes)) ? Math.floor(Number(potatoes)) : 0;
       document.getElementById("count").innerText = "Potatoes: " + displayPotatoes;
       document.getElementById("farmers").innerText = Number.isFinite(Number(farmers)) ? Number(farmers) : 0;
       document.getElementById("farmerCost").innerText = Number.isFinite(Number(farmerCost)) ? Number(farmerCost) : 10;
       document.getElementById("tractors").innerText = Number.isFinite(Number(tractors)) ? Number(tractors) : 0;
       document.getElementById("tractorCost").innerText = Number.isFinite(Number(tractorCost)) ? Number(tractorCost) : 100;
       document.getElementById("land").innerText = Number.isFinite(Number(land)) ? Number(land) : 0;
       document.getElementById("landCost").innerText = Number.isFinite(Number(landCost)) ? Number(landCost) : 500;
     }
    function clickPotato() {
        potatoes += 1;
        updateDisplay();
    }

    function buyFarmer() {
        if (potatoes >= farmerCost) {
            potatoes -= farmerCost;
            farmers += 1;
            farmerCost = Math.floor(farmerCost * 1.5);
            updateDisplay();
        }
    }

    function buyTractor() {
        if (potatoes >= tractorCost) {
            potatoes -= tractorCost;
            tractors += 1;
            tractorCost = Math.floor(tractorCost * 1.5);
            updateDisplay();
        }
    }

    function buyLand() {
        if (potatoes >= landCost) {
            potatoes -= landCost;
            land += 1;
            landCost = Math.floor(landCost * 1.5);
            updateDisplay();
        }
    }

    function autoFarm() {
        potatoes += farmers * 0.5 + tractors * 2 + land * 5;
        updateDisplay();
    }

     function resetGame() {
        if (confirm("Are you sure you want to reset your game? This cannot be undone.")) {
            potatoes = 0;
            farmers = 0;
            tractors = 0;
            land = 0;
            farmerCost = 10;
            tractorCost = 100;
            landCost = 500;
            updateDisplay();
        }
    }

    setInterval(autoFarm, 1000);

    // Save system
    function saveGame() {
        localStorage.setItem("potatoSave", JSON.stringify({
            potatoes: potatoes,
            farmers: farmers,
            farmerCost: farmerCost,
            tractors: tractors,
            tractorCost: tractorCost,
            land: land,
            landCost: landCost
        }));
    }

    function loadGame() {
        const raw = localStorage.getItem("potatoSave");
        if (!raw) return;
        try {
            const save = JSON.parse(raw) || {};
            potatoes = Number(save.potatoes) || 0;
            farmers = Number(save.farmers) || 0;
            farmerCost = Number(save.farmerCost) || 10;
            tractors = Number(save.tractors) || 0;
            tractorCost = Number(save.tractorCost) || 100;
            land = Number(save.land) || 0;
            landCost = Number(save.landCost) || 500;
        } catch (e) {
            console.warn("Failed to load potatoSave, clearing corrupt save:", e);
            localStorage.removeItem("potatoSave");
        }
    }

    setInterval(saveGame, 3000);

    loadGame();
    updateDisplay();
</script>

</body>
</html>
